name: AnhEmMotor Management - Pull Request (Pre-deploy) check

on:
  pull_request:
    branches: ["master", "main", "merge/dev"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Lint
        run: npm run lint -- --max-warnings 0
